# Build website/ and deploy to GitHub Enterprise Pages on
# git.soma.salesforce.com. The same astro.config.mjs is shared with the
# Heroku deploy — the DEPLOY_TARGET env var below switches the
# `site` + `base` to the GHE Pages URL pattern
# (https://pages.git.soma.salesforce.com/chatbots/zana/).
#
# Pages must be enabled for this repo: Settings → Pages → Source =
# "GitHub Actions". The two `permissions` blocks below grant the
# token Pages-write + OIDC scope, which is what actions/deploy-pages
# requires.
name: Deploy website to GHE Pages

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - run: npm ci

      - name: Build (GHE Pages target)
        env:
          DEPLOY_TARGET: ghe-pages
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
